<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>CropWatch — %sveltekit.error.message%</title>
		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
					Ubuntu, Cantarell, 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				background: #0f172a;
				color: #e2e8f0;
				padding: 1.5rem;
			}

			.error-card {
				max-width: 28rem;
				width: 100%;
				text-align: center;
				background: #1e293b;
				border-radius: 0.75rem;
				padding: 2.5rem 2rem;
				box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
			}

			.error-code {
				font-size: 4rem;
				font-weight: 800;
				opacity: 0.2;
				line-height: 1;
			}

			.error-title {
				font-size: 1.5rem;
				font-weight: 600;
				margin: 0.75rem 0 0.5rem;
			}

			.error-message {
				font-size: 0.875rem;
				opacity: 0.7;
				margin-bottom: 1.5rem;
			}

			.error-actions {
				display: flex;
				flex-wrap: wrap;
				gap: 0.75rem;
				justify-content: center;
			}

			.btn {
				display: inline-block;
				padding: 0.625rem 1.25rem;
				border-radius: 0.5rem;
				font-size: 0.875rem;
				font-weight: 500;
				text-decoration: none;
				cursor: pointer;
				border: none;
			}

			.btn-primary {
				background: #3b82f6;
				color: #fff;
			}

			.btn-primary:hover {
				background: #2563eb;
			}

			.btn-ghost {
				background: transparent;
				color: #94a3b8;
				border: 1px solid #334155;
			}

			.btn-ghost:hover {
				background: #334155;
				color: #e2e8f0;
			}
		</style>
	</head>
	<body>
		<div class="error-card">
			<div class="error-code">%sveltekit.status%</div>
			<h1 class="error-title">Something went wrong</h1>
			<p class="error-message">%sveltekit.error.message%</p>
			<div class="error-actions">
				<button
					class="btn btn-primary"
					onclick="try{localStorage.clear()}catch(e){}try{sessionStorage.clear()}catch(e){}document.cookie.split(';').forEach(function(c){document.cookie=c.split('=')[0].trim()+'=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/'});window.location.href='/auth/login?reason=error-recovery'"
				>
					Reset &amp; Sign In
				</button>
				<a class="btn btn-ghost" href="/">Try Home</a>
			</div>
		</div>
	</body>
</html>
