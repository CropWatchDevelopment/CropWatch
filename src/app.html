<!doctype html>

<html lang="%paraglide.lang%" translate="no" class="notranslate" dir="%paraglide.dir%">
	<head>
		<meta charset="utf-8" />

		<!-- Suppress browser "translate this page?" prompts; i18n is handled in-app. -->
		<meta name="google" content="notranslate" />

		<link rel="icon" href="%sveltekit.assets%/icons/favicon.svg" sizes="any" type="image/svg+xml" />

		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
